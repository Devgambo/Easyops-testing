name: Deploy to EC2

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Validate required deploy secrets
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}
        run: |
          missing=0

          for name in EC2_HOST EC2_USER EC2_SSH_KEY EC2_APP_DIR; do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "::error title=Missing secret::$name is not configured in repository secrets"
              missing=1
            fi
          done

          if [ -n "$EC2_SSH_KEY" ]; then
            if [[ "$EC2_SSH_KEY" != *"BEGIN OPENSSH PRIVATE KEY"* ]] && [[ "$EC2_SSH_KEY" != *"BEGIN RSA PRIVATE KEY"* ]] && [[ "$EC2_SSH_KEY" != *"BEGIN EC PRIVATE KEY"* ]]; then
              echo "::error title=Invalid EC2_SSH_KEY format::EC2_SSH_KEY does not look like a private key. Paste full PEM content including BEGIN/END lines and line breaks."
              missing=1
            fi
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          passphrase: ${{ secrets.EC2_SSH_PASSPHRASE }}
          port: ${{ secrets.EC2_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            APP_DIR="${{ secrets.EC2_APP_DIR }}"
            REPO_URL="https://github.com/${{ github.repository }}.git"

            if [ -n "${{ secrets.REPO_ACCESS_TOKEN }}" ]; then
              REPO_URL="https://${{ secrets.REPO_ACCESS_TOKEN }}@github.com/${{ github.repository }}.git"
            fi

            if [ -z "$APP_DIR" ]; then
              echo "EC2_APP_DIR secret is not set"
              exit 1
            fi

            if [ ! -d "$APP_DIR" ]; then
              mkdir -p "$APP_DIR"
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            git fetch origin main
            git checkout main
            git pull origin main

            npm ci --omit=dev

            if ! command -v pm2 >/dev/null 2>&1; then
              sudo npm install -g pm2
            fi

            pm2 startOrRestart ecosystem.config.js --env production
            pm2 save
